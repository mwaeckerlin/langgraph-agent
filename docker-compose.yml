services:
  db:
    image: postgres:latest
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-n8n}
      POSTGRES_USER: ${POSTGRES_USER:-n8n}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local_db_password}
    volumes:
      - db_data:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-n8n} -d ${POSTGRES_DB:-n8n}" ]
      interval: 5s
      timeout: 3s
      retries: 20

  n8n:
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: db
      DB_POSTGRESDB_PORT: "5432"
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-n8n}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-n8n}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:-local_db_password}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:-local_n8n_encryption_key}
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_PERSONALIZATION_ENABLED: "false"
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      db:
        condition: service_healthy

  langgraph-agent:
    image: mwaeckerlin/langgraph-agent
    build: .
    ports:
      - "8583:8000"
    environment:
      DATABASE_URI: postgresql://${POSTGRES_USER:-n8n}:${POSTGRES_PASSWORD:-local_db_password}@db:5432/${POSTGRES_DB:-n8n}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://openrouter.ai/api/v1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LANGGRAPH_API_KEY: ${LANGGRAPH_API_KEY:-local_langgraph_api_key}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      GRAPHS_DIR: /app/graphs
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
  n8n_data:
